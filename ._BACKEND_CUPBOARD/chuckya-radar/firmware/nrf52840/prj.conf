# Zephyr RTOS config for CHUCKYA bracelet
# Target: nrf52840dk_nrf52840

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="CHUCKYA-B01"
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y

# CBOR
CONFIG_TINYCBOR=y

# GPIO (button)
CONFIG_GPIO=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Power management
CONFIG_PM=y
CONFIG_PM_DEVICE=y
