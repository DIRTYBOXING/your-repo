# ╔══════════════════════════════════════════════════════════════╗
# ║  DFC CHUCKYA RADAR — NGINX REVERSE PROXY                   ║
# ║  Routes: /ws/ → ws-server, /v1/ → radar-api,               ║
# ║  /metrics → metrics-server, /tiles/ → tileserver, / → UI   ║
# ╚══════════════════════════════════════════════════════════════╝

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ─── Rate limiting ───
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m  rate=10r/s;

    # ─── Upstream services ───
    upstream frontend  { server frontend:3000; }
    upstream radar_api { server radar-api:8080; }
    upstream ws_server { server ws-server:8080; }
    upstream metrics   { server metrics-server:9091; }
    upstream tileserver { server tileserver:8082; }
    upstream device_verifier { server device-verifier:8083; }
    upstream blackbird_api   { server blackbird-api:8000; }

    # ─── Map for WebSocket upgrade ───
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost;

        # ─── Security headers ───
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # ─── WebSocket (sub-second alert broadcast) ───
        location /ws/ {
            limit_req zone=ws burst=20 nodelay;
            proxy_pass http://ws_server/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ─── API (ingest, alerts, police export, verified ingest) ───
        location /v1/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://radar_api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 5m;
        }

        # ─── Prometheus metrics (internal / Grafana scrape) ───
        location /metrics {
            proxy_pass http://metrics/metrics;
            proxy_set_header Host $host;
        }

        # ─── Map tiles (Mapbox tileserver) ───
        location /tiles/ {
            proxy_pass http://tileserver/;
            proxy_set_header Host $host;
            proxy_cache_valid 200 1h;
        }

        # ─── Health check ───
        location /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ─── Device Verifier (public key, consent, device status) ───
        location /v1/device/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://device_verifier/v1/device/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Blackbird API (FastAPI ingest & matching) ───
        location /blackbird/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://blackbird_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── React frontend (catch-all) ───
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
