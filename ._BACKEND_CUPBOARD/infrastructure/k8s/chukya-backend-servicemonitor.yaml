# ═══════════════════════════════════════════════════════════════════════════
# Chukya 3.0 — ServiceMonitor for backend (Prometheus Operator)
# ═══════════════════════════════════════════════════════════════════════════
# Scrapes /metrics from chukya-safety backend pods.
# Apply:  kubectl apply -f infrastructure/k8s/chukya-backend-servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chukya-backend-servicemonitor
  namespace: monitoring
  labels:
    release: prometheus
    app: chukya-safety
spec:
  selector:
    matchLabels:
      app: chukya-safety
  namespaceSelector:
    matchNames:
      - staging
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
