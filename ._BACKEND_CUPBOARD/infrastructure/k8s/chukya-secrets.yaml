# ═══════════════════════════════════════════════════════════════════════════
# Chukya 3.0 — Kubernetes Secret (sensitive values)
# ═══════════════════════════════════════════════════════════════════════════
# WARNING: Replace placeholder values before applying.
# For production, use sealed-secrets, external-secrets-operator, or
# GCP Secret Manager with workload identity instead of static manifests.
#
# Apply:  kubectl apply -f infrastructure/k8s/chukya-secrets.yaml
# Verify: kubectl get secret chukya-secrets -n staging
apiVersion: v1
kind: Secret
metadata:
  name: chukya-secrets
  namespace: staging
  labels:
    app: chukya-safety
    component: secrets
type: Opaque
stringData:
  # HMAC key used by Cloud Functions to hash phone numbers.
  # Generate with: openssl rand -hex 32
  HMAC_SECRET: "REPLACE_WITH_HMAC_SECRET"
  # Firebase service account JSON (base64-encoded or mount as file).
  # Prefer workload identity over static keys in GKE.
  # FIREBASE_SA_JSON: ""
