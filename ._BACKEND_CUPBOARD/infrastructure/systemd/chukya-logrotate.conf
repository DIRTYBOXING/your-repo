# ═══════════════════════════════════════════════════════════════════════════
# Chukya 3.0 — logrotate config for VM deployments
# ═══════════════════════════════════════════════════════════════════════════
# Install:
#   sudo cp infrastructure/systemd/chukya-logrotate.conf /etc/logrotate.d/chukya
#   sudo logrotate --debug /etc/logrotate.d/chukya   # dry-run test

/var/log/chukya/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 chukya chukya
    sharedscripts
    postrotate
        systemctl reload chukya-safety >/dev/null 2>&1 || true
    endscript
}
