apiVersion: v1
kind: Namespace
metadata:
  name: dfc

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dfc-config
  namespace: dfc
data:
  DATABASE_URL: "postgresql://dfc_admin:dfc-local-postgres-change-me@dfc-postgres:5432/dfc"
  REDIS_URL: "redis://dfc-redis:6379"
  PROMETHEUS_URL: "http://prometheus:9090"
  PYTHON_AI_URL: "http://dfc-python-ai:5000"
  MINIO_ENDPOINT: "dfc-minio:9000"
  INFERENCE_SERVICE_URL: "http://dfc-inference:8080"

---
apiVersion: v1
kind: Secret
metadata:
  name: dfc-secrets
  namespace: dfc
type: Opaque
stringData:
  POSTGRES_PASSWORD: "dfc-local-postgres-change-me"
  JWT_PRIVATE_KEY: "REPLACE_WITH_PRIVATE_PEM"
  JWT_PUBLIC_KEY: "REPLACE_WITH_PUBLIC_PEM"
  OPENAI_API_KEY: "REPLACE_WITH_OPENAI_KEY"
  STRIPE_SECRET: "REPLACE_WITH_STRIPE_SECRET"
  GEMINI_KEY: "REPLACE_WITH_GEMINI_KEY"
  GOOGLE_AI_KEY: "REPLACE_WITH_GOOGLE_AI_KEY"
  ANTHROPIC_API_KEY: "REPLACE_WITH_ANTHROPIC_KEY"
  MINIO_ROOT_PASSWORD: "REPLACE_WITH_MINIO_PASSWORD"

---
# Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: dfc-gateway
  namespace: dfc
spec:
  selector:
    app: dfc-gateway
  ports:
    - port: 80
      targetPort: 80
    - port: 443
      targetPort: 443

---
# Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfc-gateway
  namespace: dfc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dfc-gateway
  template:
    metadata:
      labels:
        app: dfc-gateway
    spec:
      securityContext:
        runAsUser: 101 # NGINX user
        runAsGroup: 101
        fsGroup: 101
        runAsNonRoot: true
      containers:
        - name: gateway
          image: nginx:1-alpine
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
          volumes:
            - name: gateway-config
              configMap:
                name: dfc-gateway-config

---
# Gateway ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: dfc-gateway-config
  namespace: dfc
data:
  nginx.conf: |
    worker_processes auto;
    events { worker_connections 1024; }
    http {
      resolver kube-dns.kube-system.svc.cluster.local valid=30s;
      upstream backend { server dfc-backend:8000; }
      upstream python_ai { server dfc-python-ai:5000; }
      upstream inference { server dfc-inference:8080; }
      upstream promotion { server dfc-promotion:8080; }
      server {
        listen 80;
        location /healthz { return 200 'ok'; add_header Content-Type text/plain; }
        location /api/ { proxy_pass http://backend; proxy_set_header Host $host; }
        location /ai/ { proxy_pass http://python_ai; proxy_set_header Host $host; }
        location /infer { proxy_pass http://inference; proxy_set_header Host $host; }
        location /promote { proxy_pass http://promotion; proxy_set_header Host $host; }
      }
    }

---
# Postgres Service
apiVersion: v1
kind: Service
metadata:
  name: dfc-postgres
  namespace: dfc
spec:
  selector:
    app: dfc-postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# Postgres Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfc-postgres
  namespace: dfc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dfc-postgres
  template:
    metadata:
      labels:
        app: dfc-postgres
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:15-3.3
          envFrom:
            - configMapRef:
                name: dfc-config
            - secretRef:
                name: dfc-secrets
          env:
            - name: POSTGRES_DB
              value: dfc
            - name: POSTGRES_USER
              value: dfc_admin
          ports:
            - containerPort: 5432
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "dfc_admin"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dfc_admin"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: dfc-postgres-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: dfc-redis
  namespace: dfc
spec:
  selector:
    app: dfc-redis
  ports:
    - port: 6379
      targetPort: 6379

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfc-redis
  namespace: dfc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dfc-redis
  template:
    metadata:
      labels:
        app: dfc-redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# MinIO Service
apiVersion: v1
kind: Service
metadata:
  name: dfc-minio
  namespace: dfc
spec:
  selector:
    app: dfc-minio
  ports:
    - port: 9000
      targetPort: 9000
    - port: 9001
      targetPort: 9001

---
# MinIO Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfc-minio
  namespace: dfc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dfc-minio
  template:
    metadata:
      labels:
        app: dfc-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          envFrom:
            - secretRef:
                name: dfc-secrets
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
            - containerPort: 9001
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: minio-storage
              mountPath: /data
      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: dfc-minio-pvc

---
# Python AI Service
apiVersion: v1
kind: Service
metadata:
  name: dfc-python-ai
  namespace: dfc
spec:
  selector:
    app: dfc-python-ai
  ports:
    - port: 5000
      targetPort: 5000

---
# Python AI Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfc-python-ai
  namespace: dfc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dfc-python-ai
  template:
    metadata:
      labels:
        app: dfc-python-ai
    spec:
      containers:
        - name: dfc-python-ai
          image: REPLACE_WITH_REGISTRY/dfc-python-ai:latest
          envFrom:
            - configMapRef:
                name: dfc-config
            - secretRef:
                name: dfc-secrets
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi

---
# Backend API Service
apiVersion: v1
kind: Service
metadata:
  name: dfc-backend
  namespace: dfc
spec:
  selector:
    app: dfc-backend
  ports:
    - port: 8000
      targetPort: 8000

---
# Backend API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfc-backend
  namespace: dfc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dfc-backend
  template:
    metadata:
      labels:
        app: dfc-backend
    spec:
      containers:
        - name: dfc-backend
          image: REPLACE_WITH_REGISTRY/dfc-backend:latest
          envFrom:
            - configMapRef:
                name: dfc-config
            - secretRef:
                name: dfc-secrets
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi

---
# Inference Service
apiVersion: v1
kind: Service
metadata:
  name: dfc-inference
  namespace: dfc
spec:
  selector:
    app: dfc-inference
  ports:
    - port: 8080
      targetPort: 8080

---
# Inference Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfc-inference
  namespace: dfc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dfc-inference
  template:
    metadata:
      labels:
        app: dfc-inference
    spec:
      containers:
        - name: dfc-inference
          image: REPLACE_WITH_REGISTRY/dfc-inference:latest
          envFrom:
            - configMapRef:
                name: dfc-config
            - secretRef:
                name: dfc-secrets
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi

---
# Promotion Worker Service
apiVersion: v1
kind: Service
metadata:
  name: dfc-promotion
  namespace: dfc
spec:
  selector:
    app: dfc-promotion
  ports:
    - port: 8080
      targetPort: 8080

---
# Promotion Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfc-promotion
  namespace: dfc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dfc-promotion
  template:
    metadata:
      labels:
        app: dfc-promotion
    spec:
      containers:
        - name: dfc-promotion
          image: REPLACE_WITH_REGISTRY/dfc-promotion:latest
          envFrom:
            - configMapRef:
                name: dfc-config
            - secretRef:
                name: dfc-secrets
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

---
# HPAs
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dfc-backend-hpa
  namespace: dfc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dfc-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 60

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dfc-inference-hpa
  namespace: dfc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dfc-inference
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85

---
# Pod Disruption Budgets
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dfc-backend-pdb
  namespace: dfc
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: dfc-backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dfc-postgres-pdb
  namespace: dfc
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: dfc-postgres

---
# PVCs (bind to these in Deployments above)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dfc-postgres-pvc
  namespace: dfc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dfc-minio-pvc
  namespace: dfc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
