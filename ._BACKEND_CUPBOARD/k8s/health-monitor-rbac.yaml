apiVersion: v1
kind: ServiceAccount
metadata:
  name: health-monitor
  namespace: dfc

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: health-monitor-reader
  namespace: dfc
rules:
  - apiGroups: [""] # "" indicates the core API group
    resources: ["services"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: health-monitor-binding
  namespace: dfc
subjects:
  - kind: ServiceAccount
    name: health-monitor
    namespace: dfc
roleRef:
  kind: Role
  name: health-monitor-reader
  apiGroup: rbac.authorization.k8s.io
