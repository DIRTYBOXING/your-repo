# Minimal transport test spec used by ppv-staging-gate transport-smoke job
transport:
  name: transport-service
  baseUrl: "https://transport.staging.yourdomain.com"
  healthPath: "/health"
  smoke:
    - name: status
      method: GET
      path: /v1/status
      expect:
        status: 200
    - name: publish
      method: POST
      path: /v1/publish
      body:
        event: "smoke"
      expect:
        status: 200
