<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="DFC platform blueprint slide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7f7"/>
      <stop offset="100%" stop-color="#e8eef5"/>
    </linearGradient>
    <style>
      .title { font: 700 52px 'Segoe UI', Arial, sans-serif; fill: #f7f7f7; }
      .subtitle { font: 400 24px 'Segoe UI', Arial, sans-serif; fill: #d9e2ec; }
      .card-title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0b132b; }
      .card-text { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #102a43; }
      .small { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #334e68; }
      .badge { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #102a43; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="220" fill="#3a506b" opacity="0.25"/>
  <circle cx="1470" cy="820" r="260" fill="#5bc0be" opacity="0.18"/>

  <text x="80" y="90" class="title">Data Fight Central: Professional Platform Blueprint</text>
  <text x="80" y="130" class="subtitle">Social + PPV + Creator Ecosystem (Not Demo Drift)</text>

  <rect x="80" y="180" rx="20" ry="20" width="450" height="540" fill="url(#card)"/>
  <rect x="575" y="180" rx="20" ry="20" width="450" height="540" fill="url(#card)"/>
  <rect x="1070" y="180" rx="20" ry="20" width="450" height="540" fill="url(#card)"/>

  <text x="110" y="240" class="card-title">1) UI Layer</text>
  <text x="110" y="285" class="card-text">- Event posters + cards</text>
  <text x="110" y="320" class="card-text">- Secure checkout CTA</text>
  <text x="110" y="355" class="card-text">- Player entry for entitled users</text>
  <text x="110" y="410" class="small">Rule: No game/demo copy on commerce surfaces.</text>

  <text x="605" y="240" class="card-title">2) Platform Logic</text>
  <text x="605" y="285" class="card-text">- Entitlement validation</text>
  <text x="605" y="320" class="card-text">- Mux auth token flow</text>
  <text x="605" y="355" class="card-text">- Runtime readiness checks</text>
  <text x="605" y="410" class="small">Rule: If readiness is not true, release fails.</text>

  <text x="1100" y="240" class="card-title">3) Infrastructure</text>
  <text x="1100" y="285" class="card-text">- GCS + CDN poster serving</text>
  <text x="1100" y="320" class="card-text">- CI staging gate</text>
  <text x="1100" y="355" class="card-text">- One-click rollback runbook</text>
  <text x="1100" y="410" class="small">Rule: Fail closed, never pass on uncertainty.</text>

  <rect x="80" y="760" rx="14" ry="14" width="1440" height="92" fill="#e0fbfc"/>
  <text x="110" y="815" class="badge">Operating Principle: Professional platform behavior by default. Prediction gameplay is isolated to fight predictor features only.</text>
</svg>
