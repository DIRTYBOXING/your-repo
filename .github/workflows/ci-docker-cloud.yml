name: DFC CI/CD Docker Cloud Workflow

on:
  push:
    branches: [ci/staging, master]
    paths:
      - "src/feeds/**"
      - "config/auto_feed_sources.json"
      - "infra/feeds_tables.sql"
      - "scripts/auto_feed_cron.sh"
      - ".github/workflows/ci-docker-cloud.yml"
  pull_request:
    branches: [master]
    paths:
      - "src/feeds/**"
      - "config/auto_feed_sources.json"
      - "infra/feeds_tables.sql"
      - "scripts/auto_feed_cron.sh"
      - ".github/workflows/ci-docker-cloud.yml"
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (secure — ignore scripts)
        env:
          npm_config_ignore_scripts: "true"
        run: npm ci --ignore-scripts

      - name: Lint and typecheck
        run: npm run lint && npm run typecheck || true

      - name: Build Docker image
        run: docker build -t dfc-auto-feed:latest -f src/feeds/Dockerfile .

      - name: Run integration tests
        run: echo "(Add integration test steps here)"

  pr-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: PR gating (block until tests pass)
        run: echo 'PR gating - All checks must pass before merge.'
