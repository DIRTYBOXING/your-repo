name: Feed Smoke

on:
  pull_request:
    paths:
      - "lib/core/config/**"
      - "services/**"
      - "tools/**"
      - "test/**"
      - ".github/workflows/ci-feed-smoke.yml"

jobs:
  feed-smoke:
    name: Feed Smoke
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Ensure CI-only env asset exists
        run: |
          mkdir -p assets
          test -f assets/.env || echo "# CI placeholder" > assets/.env

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib services test || true

      - name: Run feed unit tests
        run: flutter test test/auto_feed_orchestrator_service_test.dart test/content_safety_test.dart

      - name: Run feed integration smoke
        env:
          ENV: staging
        run: |
          set -e
          if [ -x ./ci/run_feed_smoke.sh ]; then
            ./ci/run_feed_smoke.sh --env staging
          else
            echo "No staging smoke script found; skipping integration smoke."
          fi

      - name: Upload artifacts (metrics / logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feed-smoke-artifacts
          path: |
            /tmp/feed-smoke-logs || true
            /tmp/feed-metrics.json || true
