name: DFC CI

on:
  pull_request:
    branches: [master, main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/workflows/**"
  push:
    branches: [master, main]
    paths:
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "pubspec.lock"

concurrency:
  group: dfc-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: analyze + tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Ensure CI-only env asset exists
        run: |
          mkdir -p assets
          test -f assets/.env || echo "# CI placeholder" > assets/.env

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyzer
        run: flutter analyze --no-fatal-infos

      - name: Flutter test
        run: flutter test
