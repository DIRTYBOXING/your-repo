name: DFC Deploy Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Flutter Analyze ──────────────────────────────────────────────────────
  flutter-check:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

  # ── 2. Build Flutter Web ────────────────────────────────────────────────────
  build-web:
    name: Build Flutter Web
    needs: flutter-check
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT: datafightcentral
      MAPS_WEB_SECRET_NAME: maps-api-key
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}
      - name: Fetch Maps key from Secret Manager
        shell: bash
        run: |
          set -euo pipefail
          MAPS_KEY="$(gcloud secrets versions access latest --secret="${MAPS_WEB_SECRET_NAME}" --project="${GCP_PROJECT}")"
          STRIPE_PK_LIVE="$(gcloud secrets versions access latest --secret="stripe-pk-live" --project="${GCP_PROJECT}" 2>/dev/null || true)"
          if [[ -z "${MAPS_KEY}" ]]; then
            echo "maps-api-key secret resolved to an empty value" >&2
            exit 1
          fi
          {
            echo "GOOGLE_MAPS_API_KEY_WEB_PROD=${MAPS_KEY}"
            echo "GOOGLE_MAPS_API_KEY_WEB=${MAPS_KEY}"
            [[ -n "${STRIPE_PK_LIVE}" ]] && echo "STRIPE_PK_LIVE=${STRIPE_PK_LIVE}"
          } >> "$GITHUB_ENV"
      - name: Materialize web build env
        shell: pwsh
        run: |
          $mapsProdKey = $env:GOOGLE_MAPS_API_KEY_WEB_PROD
          $mapsFallbackKey = $env:GOOGLE_MAPS_API_KEY_WEB
          $stripeLiveKey = $env:STRIPE_PK_LIVE
          $ppvStorefrontBase = 'https://australia-southeast1-datafightcentral.cloudfunctions.net'

          if ([string]::IsNullOrWhiteSpace($mapsProdKey) -and [string]::IsNullOrWhiteSpace($mapsFallbackKey)) {
            throw 'Missing GOOGLE_MAPS_API_KEY_WEB_PROD or GOOGLE_MAPS_API_KEY_WEB GitHub secret for the production web build.'
          }

          $envLines = [System.Collections.Generic.List[string]]::new()
          $envLines.Add('FIREBASE_PROJECT_ID=datafightcentral')
          $envLines.Add("DFC_PPV_STOREFRONT_BASE=$ppvStorefrontBase")
          $envLines.Add('DFC_PPV_AUTO_CONFIRM_SANDBOX=false')
          if (-not [string]::IsNullOrWhiteSpace($mapsProdKey)) {
            $envLines.Add("GOOGLE_MAPS_API_KEY_WEB_PROD=$mapsProdKey")
          }
          if (-not [string]::IsNullOrWhiteSpace($mapsFallbackKey)) {
            $envLines.Add("GOOGLE_MAPS_API_KEY_WEB=$mapsFallbackKey")
          }
          if (-not [string]::IsNullOrWhiteSpace($stripeLiveKey)) {
            $envLines.Add("STRIPE_PK_LIVE=$stripeLiveKey")
          }

          Set-Content -Path .env -Value $envLines
      - name: Build Flutter web with runtime env wrapper
        shell: pwsh
        run: ./scripts/run_with_env.ps1 -Action build -Mode real
      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web
          retention-days: 3

  # ── 3. Deploy to Firebase Hosting ───────────────────────────────────────────
  deploy-hosting:
    name: Deploy Firebase Hosting
    needs: build-web
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
      - name: Download web build
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/web
      - name: Deploy to Firebase Hosting
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: datafightcentral
      - name: Skip notice
        if: env.FIREBASE_SERVICE_ACCOUNT == ''
        run: echo "::notice::FIREBASE_SERVICE_ACCOUNT not configured — skipping hosting deploy"

  # ── 4. Deploy Cloud Functions ───────────────────────────────────────────────
  deploy-functions:
    name: Deploy Cloud Functions
    needs: flutter-check
    runs-on: ubuntu-latest
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci --ignore-scripts
      - name: Install Firebase CLI (secure)
        run: npm install -g firebase-tools --ignore-scripts
      - name: Deploy Functions
        if: env.FIREBASE_TOKEN != ''
        run: firebase deploy --only functions --project datafightcentral
      - name: Skip notice
        if: env.FIREBASE_TOKEN == ''
        run: echo "::notice::FIREBASE_TOKEN not configured — skipping functions deploy"

  # ── 5. Deploy Firestore Rules + Storage Rules ──────────────────────────────
  deploy-rules:
    name: Deploy Security Rules
    needs: flutter-check
    runs-on: ubuntu-latest
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Firebase CLI (secure)
        run: npm install -g firebase-tools --ignore-scripts
      - name: Deploy Firestore Rules
        if: env.FIREBASE_TOKEN != ''
        run: firebase deploy --only firestore:rules --project datafightcentral
      - name: Deploy Storage Rules
        if: env.FIREBASE_TOKEN != ''
        run: firebase deploy --only storage --project datafightcentral
      - name: Skip notice
        if: env.FIREBASE_TOKEN == ''
        run: echo "::notice::FIREBASE_TOKEN not configured — skipping rules deploy"

# Required GitHub Secrets:
# - FIREBASE_SERVICE_ACCOUNT: Firebase Hosting service account JSON (from Firebase Console > Project Settings > Service Accounts)
# - FIREBASE_TOKEN: Generated via `firebase login:ci`
# - FIREBASE_SERVICE_ACCOUNT should also include Secret Manager accessor role for runtime key retrieval
# - GITHUB_TOKEN: Auto-provided by GitHub Actions
