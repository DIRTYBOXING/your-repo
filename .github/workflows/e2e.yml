name: E2E Test

on:
  workflow_dispatch:
  push:
    paths:
      - "tools/e2e_test.sh"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Only run when the verifier image secret is configured
    if: ${{ vars.VERIFIER_IMAGE != '' }}
    services:
      verifier:
        image: ${{ vars.VERIFIER_IMAGE }}
        ports: ["8081:8081"]
        options: >-
          --health-cmd "curl -f http://localhost:8081/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y jq openssl unzip curl

      - name: Wait for verifier
        run: |
          for i in $(seq 1 30); do
            curl -sS http://localhost:8081/health && break || sleep 2
          done

      - name: Run E2E test
        id: e2e
        run: |
          chmod +x tools/e2e_test.sh
          VERIFIER_URL=http://localhost:8081 PUBLIC_PEM=public.pem ./tools/e2e_test.sh

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          payload=$(cat <<EOF
          {
            "text": ":rotating_light: *E2E Test Failure*\n*Repo*: ${{ github.repository }}\n*Branch*: ${{ github.ref_name }}\n*Run*: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_id }}>\n*Time*: $(date -u +%Y-%m-%dT%H:%M:%SZ)\n*Action*: check verifier logs, restart service, re-run E2E.\n*Owner*: @ops_lead"
          }
          EOF
          )
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK"
          else
            echo "SLACK_WEBHOOK secret not set — skipping notification"
          fi
