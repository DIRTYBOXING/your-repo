name: Emulator Verification

on:
  pull_request:
    branches: [master]
    paths:
      - "lib/**"
      - "test/**"
      - "scripts/**"
      - "docs/postman/**"
      - "functions/**"
      - "firebase.json"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/emulator-verification.yml"
  workflow_dispatch:

jobs:
  verify-emulator-lane:
    name: emulator-lane
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install root npm dependencies
        env:
          npm_config_ignore_scripts: "true"
        run: npm ci --ignore-scripts

      - name: Install functions npm dependencies
        env:
          npm_config_ignore_scripts: "true"
        run: npm ci --ignore-scripts --prefix functions

      - name: Ensure CI-only env asset exists
        run: |
          mkdir -p assets
          test -f assets/.env || echo "# CI placeholder" > assets/.env

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Firebase CLI (secure)
        run: npm install -g firebase-tools@13.35.1 --ignore-scripts

      - name: Run emulator verification lane
        run: firebase emulators:exec --project datafightcentral "npm run verify:emulator"
