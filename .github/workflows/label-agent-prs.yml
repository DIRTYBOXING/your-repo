name: Label Agent PRs

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  label-agent-pr:
    if: >-
      ${
        github.event.pull_request.user.type == 'Bot' ||
        contains(github.event.pull_request.user.login, 'copilot') ||
        contains(github.event.pull_request.user.login, 'sonar') ||
        contains(github.event.pull_request.user.login, 'gitar') ||
        contains(github.actor, 'copilot') ||
        contains(github.actor, 'sonar') ||
        contains(github.actor, 'gitar')
      }
    runs-on: ubuntu-latest
    steps:
      - name: Apply agent-fix label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: agent-fix
