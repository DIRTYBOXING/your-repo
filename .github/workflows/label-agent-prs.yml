name: label-agent-prs

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-agent-prs:
    if: ${{ github.event.pull_request.user.type == 'Bot' || contains(github.event.pull_request.user.login, 'copilot') || contains(github.event.pull_request.user.login, 'sonar') || contains(github.event.pull_request.user.login, 'gitar') || contains(github.actor, 'copilot') || contains(github.actor, 'sonar') || contains(github.actor, 'gitar') }}
    runs-on: ubuntu-latest
    steps:
      - name: Add agent-fix label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: agent-fix
