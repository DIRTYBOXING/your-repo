name: Payments + Experiments CI

on:
  pull_request:
    branches: [main, master]
    paths:
      - "backend/payments/**"
      - "backend/experiments/**"
      - "backend/rights/**"
      - "test/backend/rights/**"
      - "test/experiments/**"
      - "migrations/**"
      - ".github/workflows/payments-ci.yml"
  push:
    branches: [main, master]
    paths:
      - "backend/payments/**"
      - "backend/experiments/**"
      - "backend/rights/**"
      - "test/backend/rights/**"
      - "test/experiments/**"
      - "migrations/**"
      - ".github/workflows/payments-ci.yml"

concurrency:
  group: payments-exp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/payments/package-lock.json
      - name: Run npm audit (production deps)
        run: |
          cd backend/payments
          npm ci
          npm audit --omit=dev --audit-level=high

  migration-smoke:
    needs: [secrets-scan, dependency-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dfc
          POSTGRES_PASSWORD: dfc
          POSTGRES_DB: dfc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dfc -d dfc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: dfc
      PG_CONN: postgres://dfc:dfc@localhost:5432/dfc_test
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Migration up
        run: |
          set -euo pipefail
          psql "$PG_CONN" -f migrations/20260702_create_payments_and_webhooks.sql | tee migration_up_payments.log
          psql "$PG_CONN" -f migrations/20260702_create_rights_and_takedown.sql | tee migration_up_rights.log
          psql "$PG_CONN" -f migrations/20260702_create_experiments_and_assignments.sql | tee migration_up_experiments.log
      - name: Migration down
        run: |
          set -euo pipefail
          psql "$PG_CONN" -f migrations/20260702_drop_experiments_and_assignments.sql | tee migration_down_experiments.log
          psql "$PG_CONN" -f migrations/20260702_drop_rights_and_takedown.sql | tee migration_down_rights.log
          psql "$PG_CONN" -f migrations/20260702_drop_payments_and_webhooks.sql | tee migration_down_payments.log
      - name: Verify rollback reached clean state
        run: |
          set -euo pipefail
          psql "$PG_CONN" -tAc "
            SELECT COUNT(*)
            FROM information_schema.tables
            WHERE table_schema='public'
              AND table_name IN (
                'webhook_events',
                'provider_transactions',
                'orders',
                'ppv_entitlements',
                'ledger_entries',
                'payout_batches',
                'payout_attempts',
                'content_rights',
                'geo_policy',
                'takedown_requests',
                'experiments',
                'assignments',
                'exposures',
                'experiment_audit'
              )
          " | grep -qx '0'
      - name: Upload migration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-smoke-logs
          path: "*_*.log"

  payments-node-test:
    needs: migration-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dfc
          POSTGRES_PASSWORD: dfc
          POSTGRES_DB: dfc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dfc -d dfc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_CONN: postgres://dfc:dfc@localhost:5432/dfc_test
      RUN_PG_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/payments/package-lock.json
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply payments migration
        run: psql "$PG_CONN" -f migrations/20260702_create_payments_and_webhooks.sql
      - name: Run payments tests
        run: |
          set -euo pipefail
          cd backend/payments
          npm ci
          npm test | tee ../../payments-tests.log
      - name: Upload payments test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payments-test-logs
          path: payments-tests.log

  dart-rights-experiments-test:
    needs: migration-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Analyze scoped backend modules
        run: |
          set -euo pipefail
          flutter analyze backend/rights backend/experiments test/backend/rights test/experiments | tee dart-analyze.log
      - name: Run rights and experiments tests
        run: |
          set -euo pipefail
          flutter test test/backend/rights | tee dart-rights-tests.log
          flutter test test/experiments/assignment_test.dart | tee dart-experiments-tests.log
      - name: Upload dart logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-rights-experiments-logs
          path: |
            dart-analyze.log
            dart-rights-tests.log
            dart-experiments-tests.log
