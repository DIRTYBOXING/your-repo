name: Promoter Smoke

on:
  pull_request:
    branches: [master, feat/**]
    paths:
      - "web/promoters.html"
      - "test/visual/promoter_how_we_work.spec.ts"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/promoter-smoke.yml"
  workflow_dispatch:

concurrency:
  group: promoter-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promoter-smoke:
    name: promoter-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Deterministic install (secure)
        env:
          npm_config_ignore_scripts: "true"
        run: npm ci --prefer-offline --no-audit --progress=false --ignore-scripts

      - name: Install Playwright browser (chromium)
        env:
          npm_config_ignore_scripts: "true"
        run: node ./node_modules/playwright/cli.js install --with-deps chromium

      - name: Serve promoter pages
        run: python3 -m http.server 8088 --directory web &

      - name: Wait for server
        run: sleep 2

      - name: Run promoter smoke
        id: promoter_smoke_test
        run: node ./node_modules/playwright/cli.js test test/visual/promoter_how_we_work.spec.ts --project=desktop
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8088

      - name: Write promoter smoke summary
        if: always()
        run: |
          mkdir -p test-results
          cat > test-results/promoter-smoke-summary.json <<'EOF'
          {
            "workflow": "promoter-smoke",
            "result": "${{ steps.promoter_smoke_test.outcome }}",
            "runId": "${{ github.run_id }}",
            "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promoter-playwright-report-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promoter-test-results-${{ github.run_id }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Post promoter smoke verdict comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- promoter-smoke-report -->';
            const outcome = '${{ steps.promoter_smoke_test.outcome }}';
            const statusIcon = outcome === 'success' ? '✅' : '❌';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactsUrl = `${runUrl}#artifacts`;

            const body = `${marker}
            ## ${statusIcon} Promoter Smoke: ${outcome.toUpperCase()}

            - Workflow: \`promoter-smoke\`
            - Run: ${runUrl}
            - Artifacts: ${artifactsUrl}
            - Report artifact: \`promoter-playwright-report-${context.runId}\`
            - Results artifact: \`promoter-test-results-${context.runId}\`
            - Summary file: \`test-results/promoter-smoke-summary.json\`

            Verdict: ${outcome === 'success' ? 'PASS' : 'FAIL'}
            `;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments
              .filter(c => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker))
              .sort((a, b) => a.id - b.id)
              .pop();

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Notify promoter smoke failure (Slack)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack notify."
            exit 0
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ARTIFACTS_URL="${RUN_URL}#artifacts"

          PAYLOAD=$(cat <<EOF
          {
            "text": "⚠️ DFC promoter-smoke FAILED. Run: ${RUN_URL} | Artifacts: ${ARTIFACTS_URL}"
          }
          EOF
          )

          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
