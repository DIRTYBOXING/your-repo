name: DFC Sonar Quality Gate

on:
  pull_request:
    branches: [master, main]
    paths:
      - "lib/**"
      - "services/**"
      - "firestore.rules"
      - "docs/DFC_SONAR_RULE_PACK.md"
      - "sonar-project.properties"
      - ".github/workflows/quality-gate.yml"
  push:
    branches: [master, main]

concurrency:
  group: dfc-sonar-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: sonar scan + quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Sonar token exists
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is missing. Configure repository secret SONAR_TOKEN."
            exit 1
          fi

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
