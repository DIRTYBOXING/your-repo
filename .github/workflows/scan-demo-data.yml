name: Scan Demo Data

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scan-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed CSV, JSON, and SQL files
        id: files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only HEAD~1 HEAD | grep -E '\.(csv|json|sql)$' || true)
          else
            FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '\.(csv|json|sql)$' || true)
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Fail on demo tokens
        if: steps.files.outputs.files != ''
        run: |
          echo "Scanning files for banned demo/test tokens..."
          FAILED=0
          echo "${{ steps.files.outputs.files }}" | tr ' ' '\n' | while IFS= read -r f; do
            if [ -n "$f" ] && [ -f "$f" ]; then
              if grep -Ei '(demo_|test_|edu_|sample_|placeholder)' "$f"; then
                echo "::error file=$f::Banned demo/test tokens found in $f"
                FAILED=1
              fi
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "ERROR: Demo/test tokens detected. Remove them before merging."
            exit 1
          fi
          echo "No banned tokens found."

      - name: Success
        run: echo "Demo token scan passed."
