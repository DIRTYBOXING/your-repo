name: secret-scan

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so gitleaks can diff commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for private repos on the paid plan.
          # The free OSS plan covers public repos and local scanning.
          GITLEAKS_ENABLE_SUMMARY: true
