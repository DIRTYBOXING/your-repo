name: secret-scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.24.3"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks and produce report
        id: run_gitleaks
        run: |
          REPORT="gitleaks-report.json"
          if [ -f ".secrets.baseline" ]; then
            mv .secrets.baseline /tmp/dfc.secrets.baseline
          fi

          # Scan filesystem content directly to avoid PR commit-range ambiguity
          if [ -f ".gitleaks.toml" ]; then
            gitleaks detect --config .gitleaks.toml --no-git --source . --report-format json --report-path "$REPORT"
          else
            gitleaks detect --no-git --source . --report-format json --report-path "$REPORT"
          fi

          # Ensure report exists
          if [ ! -f "$REPORT" ]; then
            echo "gitleaks did not produce a report file; failing job."
            exit 2
          fi

          # Check report for leaks; exit non-zero if leaks found
          leaks_count=$(python3 -c "import json; import pathlib; p=pathlib.Path('gitleaks-report.json'); r=json.loads(p.read_text()) if p.exists() else []; print(len(r) if isinstance(r, list) else 0)")
          echo "leaks_count=$leaks_count" >> $GITHUB_OUTPUT
          if [ "$leaks_count" -gt 0 ]; then
            echo "Secrets detected ($leaks_count). Failing job."
            exit 1
          fi

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
