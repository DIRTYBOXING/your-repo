name: secret-scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: range
        run: |
          # Try to compute a safe commit range for PRs; fallback to scanning all if ambiguous
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "range=HEAD^..HEAD" >> $GITHUB_OUTPUT
          else
            echo "range=--all" >> $GITHUB_OUTPUT
          fi

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/zricethezav/gitleaks/releases/latest/download/gitleaks-linux-amd64 -o gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks and produce report
        id: run_gitleaks
        run: |
          RANGE="${{ steps.range.outputs.range }}"
          REPORT="gitleaks-report.json"
          echo "Using range: $RANGE"
          if [ "$RANGE" = "--all" ]; then
            gitleaks detect --source . --report-format json --report-path "$REPORT"
          else
            gitleaks detect --source . --commit-range "$RANGE" --report-format json --report-path "$REPORT"
          fi

          # Ensure report exists
          if [ ! -f "$REPORT" ]; then
            echo "gitleaks did not produce a report file; failing job."
            exit 2
          fi

          # Check report for leaks; exit non-zero if leaks found
          leaks_count=$(python3 -c "import json; import pathlib; p=pathlib.Path('gitleaks-report.json'); r=json.loads(p.read_text()) if p.exists() else []; print(len(r) if isinstance(r, list) else 0)")
          echo "leaks_count=$leaks_count" >> $GITHUB_OUTPUT
          if [ "$leaks_count" -gt 0 ]; then
            echo "Secrets detected ($leaks_count). Failing job."
            exit 1
          fi

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
