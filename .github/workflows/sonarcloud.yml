name: SonarCloud

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ws-gateway dependencies
        env:
          npm_config_ignore_scripts: "true"
        run: npm ci --ignore-scripts --prefix services/ws-gateway

      - name: Collect ws-gateway coverage
        run: npm run test:coverage --prefix services/ws-gateway

      - name: Check Sonar token availability
        id: sonar_token
        shell: bash
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SONAR_TOKEN is not configured; SonarCloud scan will be skipped for this run."
          fi

      - name: SonarCloud Scan
        if: steps.sonar_token.outputs.available == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Scan skipped
        if: steps.sonar_token.outputs.available != 'true'
        run: echo "Skipping SonarCloud scan because SONAR_TOKEN is not configured."
