name: supply-chain-guard

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/workflows/**"
  push:
    branches: [master]

jobs:
  workflow-policy:
    name: workflow-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check workflow install hardening
        run: bash scripts/security/check-workflow-installs.sh

  lockfile-policy:
    name: lockfile-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check lockfile coverage
        run: bash scripts/security/check-lockfiles.sh

  actions-lockfile-policy:
    name: actions-lockfile-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check actions lockfile policy
        run: bash scripts/security/check-actions-lockfile.sh
      - name: Verify actions lockfile integrity
        if: hashFiles('.github/actions.lock.json') != ''
        uses: gjtorikian/gh-actions-lockfile@v1
        continue-on-error: true
        with:
          mode: verify
          comment: false

  sbom-node-root:
    name: sbom-node-root
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deterministic install for SBOM
        env:
          npm_config_ignore_scripts: "true"
        run: npm ci --prefer-offline --no-audit --progress=false --ignore-scripts
      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p security-artifacts
          if ! npm sbom --sbom-format cyclonedx --package-lock-only > security-artifacts/sbom-root.cdx.json; then
            echo '{"bomFormat":"CycloneDX","specVersion":"1.5","version":1,"metadata":{"tools":[{"vendor":"npm","name":"npm sbom","version":"fallback"}],"component":{"type":"application","name":"Data-Fight-Central"}},"components":[]}' > security-artifacts/sbom-root.cdx.json
          fi
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-root-${{ github.run_id }}
          path: security-artifacts/sbom-root.cdx.json
          retention-days: 30

  pr-comment:
    name: pr-comment
    runs-on: ubuntu-latest
    needs: [workflow-policy, lockfile-policy, actions-lockfile-policy]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
        - name: Post supply-chain-guard verdict
          uses: actions/github-script@v7
          with:
            script: |
              const marker = '<!-- supply-chain-guard-report -->';
              const needs = ${{ toJSON(needs) }};
              const jobs = ['workflow-policy', 'lockfile-policy', 'actions-lockfile-policy'];

              const rows = jobs.map(j => {
                const result = needs[j]?.result ?? 'skipped';
                const icon = result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : '❌';
                return `| \`${j}\` | ${icon} ${result.toUpperCase()} |`;
              });

              const overallOk = jobs.every(j => (needs[j]?.result ?? 'skipped') === 'success');
              const icon = overallOk ? '✅' : '❌';
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

              const body = [
                marker,
                `## ${icon} Supply-Chain Guard: ${overallOk ? 'PASS' : 'FAIL'}`,
                '',
                '| Job | Result |',
                '|-----|--------|',
                ...rows,
                '',
                `Run: ${runUrl}`,
                `SBOM artifact: \`sbom-root-${context.runId}\` (if present)`,
              ].join('\n');

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });

              const existing = comments
                .filter(c => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker))
                .sort((a, b) => a.id - b.id)
                .pop();

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
