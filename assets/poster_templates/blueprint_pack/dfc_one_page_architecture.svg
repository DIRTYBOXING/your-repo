<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <style>
    .bg { fill: #071018; }
    .box { fill: #0f1724; stroke: #233247; stroke-width: 2; rx: 12; }
    .cloud { fill: #0b1220; stroke: #31506f; stroke-width: 2; rx: 14; }
    .lane { fill: #0c1626; stroke: #1e3147; stroke-width: 1.5; rx: 18; }
    .title { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 700; }
    .label { fill: #e5edf7; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 600; }
    .note { fill: #9fb2c8; font-family: Segoe UI, Arial, sans-serif; font-size: 12px; }
    .arrow { stroke: #7fa4c8; stroke-width: 2.5; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7fa4c8" />
    </marker>
  </defs>

  <rect width="1280" height="760" class="bg" />

  <text x="32" y="36" class="title">DFC One-Page Architecture</text>
  <text x="32" y="58" class="note">Lean production-ready PPV stack: Firebase + GCP control plane, Mux media plane, canonical DFC watch and entitlement flow.</text>

  <rect x="24" y="88" width="1232" height="182" class="lane" />
  <text x="40" y="112" class="label">Media and playback lane</text>

  <rect x="40" y="132" width="200" height="86" class="box" />
  <text x="56" y="162" class="label">Encoders</text>
  <text x="56" y="184" class="note">RTMP / SRT contribution</text>
  <text x="56" y="202" class="note">Primary + backup paths</text>

  <rect x="286" y="132" width="200" height="86" class="cloud" />
  <text x="302" y="162" class="label">Ingest Edge PoP A/B</text>
  <text x="302" y="184" class="note">Health checks and failover</text>
  <text x="302" y="202" class="note">Regional ingress readiness</text>

  <rect x="532" y="132" width="220" height="86" class="box" />
  <text x="548" y="162" class="label">Packager / Transcoder</text>
  <text x="548" y="184" class="note">HLS / DASH / CMAF</text>
  <text x="548" y="202" class="note">ABR ladder + replay hooks</text>

  <rect x="798" y="132" width="220" height="86" class="cloud" />
  <text x="814" y="162" class="label">Origin / Manifest Service</text>
  <text x="814" y="184" class="note">Signed playback decisions</text>
  <text x="814" y="202" class="note">Event state + rights gating</text>

  <rect x="1064" y="132" width="176" height="86" class="box" />
  <text x="1080" y="162" class="label">Multi-CDN / Edge</text>
  <text x="1080" y="184" class="note">Single CDN first</text>
  <text x="1080" y="202" class="note">Multi-CDN for spikes</text>

  <line x1="240" y1="175" x2="286" y2="175" class="arrow" />
  <line x1="486" y1="175" x2="532" y2="175" class="arrow" />
  <line x1="752" y1="175" x2="798" y2="175" class="arrow" />
  <line x1="1018" y1="175" x2="1064" y2="175" class="arrow" />

  <rect x="24" y="296" width="1232" height="176" class="lane" />
  <text x="40" y="320" class="label">Commerce and entitlement lane</text>

  <rect x="40" y="340" width="236" height="88" class="box" />
  <text x="56" y="370" class="label">Auth / Payments</text>
  <text x="56" y="392" class="note">Stripe + identity checks</text>
  <text x="56" y="410" class="note">Purchase and receipt flow</text>

  <rect x="330" y="340" width="312" height="88" class="cloud" />
  <text x="346" y="370" class="label">Canonical PPV Access / Entitlements</text>
  <text x="346" y="392" class="note">Firebase Functions + Firestore access truth</text>
  <text x="346" y="410" class="note">Server-side validation before playback</text>

  <rect x="696" y="340" width="250" height="88" class="box" />
  <text x="712" y="370" class="label">Player Surfaces</text>
  <text x="712" y="392" class="note">Web / iOS / Android first</text>
  <text x="712" y="410" class="note">TV after parity and proof</text>

  <line x1="276" y1="383" x2="330" y2="383" class="arrow" />
  <line x1="642" y1="383" x2="696" y2="383" class="arrow" />
  <line x1="1152" y1="218" x2="1152" y2="296" class="arrow" />
  <line x1="946" y1="383" x2="1080" y2="383" class="arrow" />

  <rect x="1012" y="340" width="228" height="88" class="cloud" />
  <text x="1028" y="370" class="label">Watch Gate Outcome</text>
  <text x="1028" y="392" class="note">Playback allowed only when</text>
  <text x="1028" y="410" class="note">entitlement, geo, and rights are valid</text>

  <rect x="24" y="498" width="1232" height="188" class="lane" />
  <text x="40" y="522" class="label">Control plane, telemetry, and ops lane</text>

  <rect x="40" y="542" width="278" height="100" class="box" />
  <text x="56" y="572" class="label">Firebase + GCP Control Plane</text>
  <text x="56" y="594" class="note">Auth, Firestore, Functions, Cloud Storage</text>
  <text x="56" y="612" class="note">Cloud Run for heavier services and jobs</text>

  <rect x="364" y="542" width="258" height="100" class="cloud" />
  <text x="380" y="572" class="label">Telemetry / Stream Processor</text>
  <text x="380" y="594" class="note">Playback, commerce, and growth events</text>
  <text x="380" y="612" class="note">Regional and platform health signals</text>

  <rect x="668" y="542" width="250" height="100" class="box" />
  <text x="684" y="572" class="label">Analytics / Recommender</text>
  <text x="684" y="594" class="note">Playback KPIs, CRO, promoter attribution</text>
  <text x="684" y="612" class="note">Lightweight recommendation inputs</text>

  <rect x="964" y="542" width="276" height="100" class="cloud" />
  <text x="980" y="572" class="label">Security / SRE</text>
  <text x="980" y="594" class="note">WAF, rate limits, synthetic tests, runbooks</text>
  <text x="980" y="612" class="note">Canary and blue-green rollout discipline</text>

  <line x1="318" y1="592" x2="364" y2="592" class="arrow" />
  <line x1="622" y1="592" x2="668" y2="592" class="arrow" />
  <line x1="918" y1="592" x2="964" y2="592" class="arrow" />
  <line x1="821" y1="428" x2="821" y2="498" class="arrow" />

  <text x="32" y="724" class="note">Operational rule: page surface -> function lane -> smoke lane. Start with a single CDN and managed packaging, then add multi-region and multi-CDN complexity only after rehearsal and measured load justify it.</text>
</svg>
