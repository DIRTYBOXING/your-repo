steps:
  # ── Build the DFC backend container ───────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/dfc-backend:$SHORT_SHA"
      - -f
      - backend/Dockerfile
      - backend/

  # ── Push to Google Container Registry ─────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push-backend
    waitFor: ["build-backend"]
    args: ["push", "gcr.io/$PROJECT_ID/dfc-backend:$SHORT_SHA"]

  # ── Deploy to Cloud Run ────────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    waitFor: ["push-backend"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - dfc-backend
      - --image=gcr.io/$PROJECT_ID/dfc-backend:$SHORT_SHA
      - --region=australia-southeast1
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest
      - --set-env-vars=NODE_ENV=production
      - --max-instances=20
      - --min-instances=1
      - --timeout=60
      - --memory=512Mi
      - --cpu=1

images:
  - "gcr.io/$PROJECT_ID/dfc-backend:$SHORT_SHA"

substitutions:
  _REGION: australia-southeast1

options:
  logging: CLOUD_LOGGING_ONLY
