apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: dfc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics
  template:
    metadata:
      labels:
        app: metrics
    spec:
      containers:
        - name: metrics
          image: gcr.io/YOUR_PROJECT/metrics-server:latest
          ports:
            - containerPort: 9091
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 3
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: metrics-server
  namespace: dfc
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9091"
spec:
  selector:
    app: metrics
  ports:
    - port: 9091
      targetPort: 9091
  type: ClusterIP
