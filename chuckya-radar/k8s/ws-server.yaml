apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-server
  namespace: dfc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ws-server
  template:
    metadata:
      labels:
        app: ws-server
    spec:
      containers:
        - name: ws
          image: gcr.io/YOUR_PROJECT/ws-server:latest
          env:
            - name: REDIS_URL
              value: "redis://redis-0.redis.dfc.svc.cluster.local:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: admin-token
                  key: token
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: ws-server
  namespace: dfc
spec:
  selector:
    app: ws-server
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
