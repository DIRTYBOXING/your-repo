<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Venue Atlas | Data Fight Central</title>
  <style>
    :root {
      --bg: #030712; --card: #0b0f19; --line: #1f2937; --accent: #10b981; --ink: #f3f4f6; --muted: #9ca3af;
    }
    body {
      margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.6; padding: 40px 5vw;
    }
    .wrapper { max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 2.5rem; border-bottom: 2px solid var(--line); padding-bottom: 15px; margin-bottom: 25px; font-weight: 900; letter-spacing: -0.02em; }
    p { color: var(--muted); font-size: 1.1rem; }
    .atlas-box { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 30px; margin-top: 30px; text-align: center; }
    .back { text-decoration: none; color: var(--muted); font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; text-transform: uppercase; }
    .back:hover { color: var(--accent); }
    .svg-ring { width: 100%; max-width: 450px; margin: 25px auto; display: block; }
  </style>
</head>
<body>
  <div class="wrapper">
    <a href="index.html" class="back">← Back to Index</a>
    <h1>Venue Atlas Registry</h1>
    <p>Simulating arena layouts, stadium coordinates, seating maps, and optimized safety routes using 3D GIS geospatial indicators.</p>

    <div class="atlas-box">
      <h3>🏟️ Brisbane Entertainment Arena Setup</h3>
      <svg class="svg-ring" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="300" height="200" fill="#0c1126" rx="10"/>
        <!-- Ring Inner Outer borders -->
        <rect x="100" y="50" width="100" height="100" stroke="#1f2937" stroke-width="1.5"/>
        <rect x="115" y="65" width="70" height="70" stroke="#10b981" stroke-width="2" fill="#030712"/>
        <text x="150" y="105" fill="#10b981" font-size="9" font-weight="900" text-anchor="middle" letter-spacing="1">CENTER RING</text>

        <!-- Seating Sectors -->
        <circle cx="50" cy="100" r="15" stroke="#1f2937" fill="rgba(255,255,255,0.02)"/>
        <text x="50" y="103" fill="#9ca3af" font-size="8" text-anchor="middle">SEC A</text>

        <circle cx="250" cy="100" r="15" stroke="#1f2937" fill="rgba(255,255,255,0.02)"/>
        <text x="250" y="103" fill="#9ca3af" font-size="8" text-anchor="middle">SEC B</text>
      </svg>
      <p style="font-size:0.9rem; color:var(--muted);">All exit routes and silent help checkpoints mapped securely within physical coordinate zones.</p>
    </div>
  </div>
</body>
</html>
