steps:
  - name: "Build container"
    id: build
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/dfc-outreach:$SHORT_SHA",
        "-t",
        "gcr.io/$PROJECT_ID/dfc-outreach:latest",
        "-f",
        "functions/Dockerfile",
        "functions/",
      ]

  - name: "Push to GCR"
    id: push
    args: ["push", "--all-tags", "gcr.io/$PROJECT_ID/dfc-outreach"]

  - name: "Deploy to Cloud Run"
    id: deploy
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "dfc-outreach"
      - "--image=gcr.io/$PROJECT_ID/dfc-outreach:$SHORT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--set-env-vars=FROM_EMAIL=legal@datafightcentral.com"
      - "--set-secrets=SENDGRID_API_KEY=SENDGRID_API_KEY:latest"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--timeout=60s"

images:
  - "gcr.io/$PROJECT_ID/dfc-outreach:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/dfc-outreach:latest"

options:
  logging: CLOUD_LOGGING_ONLY
