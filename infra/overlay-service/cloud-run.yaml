# =============================================================================
# DFC Overlay Service — Cloud Run Deployment Config
# =============================================================================
# Deploy:  gcloud run services replace cloud-run.yaml --region=australia-southeast1
# Or via:  gcloud run deploy dfc-overlay-service \
#            --image=LOCATION-docker.pkg.dev/PROJECT_ID/dfc-overlay/overlay-service:latest \
#            --region=australia-southeast1 \
#            --service-account=overlay-service-invoker@PROJECT_ID.iam.gserviceaccount.com
# =============================================================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: dfc-overlay-service
  labels:
    service: dfc-overlay
    stack: edge
    env: prod
  annotations:
    run.googleapis.com/description: >
      DFC Overlay Service — ingests wearable telemetry from Pub/Sub (Jetson edge),
      broadcasts real-time overlay commands to broadcast clients via WebSocket.
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/minScale: "1"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/sessionAffinity: "true"
    spec:
      timeoutSeconds: 300
      containerConcurrency: 80
      serviceAccountName: overlay-service-invoker@PROJECT_ID.iam.gserviceaccount.com
      containers:
      - image: LOCATION-docker.pkg.dev/PROJECT_ID/dfc-overlay/overlay-service:latest
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8080"
        - name: PROJECT_ID
          value: "PROJECT_ID"
        - name: PUBSUB_TOPIC_OUT
          value: "dfc-overlay-commands"
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
        startupProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 2
          timeoutSeconds: 5
          failureThreshold: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
          initialDelaySeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          periodSeconds: 15
