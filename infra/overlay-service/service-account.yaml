# =============================================================================
# DFC Overlay Service — Cloud Run Service Account
# =============================================================================
# Creates the overlay-service-invoker SA with minimum required IAM roles.
# This SA is used for:
#   1. Pub/Sub push subscription auth (Pub/Sub → Cloud Run /ingest)
#   2. Publishing overlay commands to dfc-overlay-commands topic
#
# Apply:  gcloud iam service-accounts create overlay-service-invoker \
#            --display-name="DFC Overlay Service Invoker"
#         gcloud projects add-iam-policy-binding PROJECT_ID \
#            --member=serviceAccount:overlay-service-invoker@PROJECT_ID.iam.gserviceaccount.com \
#            --role=ROLE
# =============================================================================

apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: overlay-service-invoker
  labels:
    service: dfc-overlay
    stack: edge
    env: prod
spec:
  displayName: DFC Overlay Service Invoker
  description: >
    Service account for Cloud Run overlay-service.
    Used for Pub/Sub push subscription auth and downstream
    overlay command publishing.

---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: overlay-service-pubsub-subscriber
  labels:
    service: dfc-overlay
spec:
  member: serviceAccount:overlay-service-invoker@PROJECT_ID.iam.gserviceaccount.com
  role: roles/pubsub.subscriber
  resourceRef:
    kind: PubSubTopic
    name: dfc-wearable-telemetry

---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: overlay-service-pubsub-publisher
  labels:
    service: dfc-overlay
spec:
  member: serviceAccount:overlay-service-invoker@PROJECT_ID.iam.gserviceaccount.com
  role: roles/pubsub.publisher
  resourceRef:
    kind: PubSubTopic
    name: dfc-overlay-commands

---
# Allow Pub/Sub to invoke Cloud Run (needed for push subscription)
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: overlay-service-run-invoker
  labels:
    service: dfc-overlay
spec:
  member: serviceAccount:overlay-service-invoker@PROJECT_ID.iam.gserviceaccount.com
  role: roles/run.invoker
  resourceRef:
    kind: Project
    external: projects/PROJECT_ID
