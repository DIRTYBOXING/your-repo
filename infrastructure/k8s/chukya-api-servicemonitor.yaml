# ═══════════════════════════════════════════════════════════════════════════
# Chukya 3.0 — ServiceMonitor for API gateway / Cloud Functions proxy
# ═══════════════════════════════════════════════════════════════════════════
# Scrapes /metrics from the chukya-api gateway that fronts Cloud Functions.
# Apply:  kubectl apply -f infrastructure/k8s/chukya-api-servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chukya-api-servicemonitor
  namespace: monitoring
  labels:
    release: prometheus
    app: chukya-api
spec:
  selector:
    matchLabels:
      app: chukya-api
  namespaceSelector:
    matchNames:
      - staging
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
