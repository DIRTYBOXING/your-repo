apiVersion: v1
kind: Namespace
metadata:
  name: dfc

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: dfc-config
  namespace: dfc
data:
  DATABASE_URL: "postgresql://dfc_admin:dfc-local-postgres-change-me@postgres:5432/dfc"
  REDIS_URL: "redis://redis:6379"
  PROMETHEUS_URL: "http://prometheus:9090"

---

apiVersion: v1
kind: Secret
metadata:
  name: dfc-secrets
  namespace: dfc
type: Opaque
stringData:
  STRIPE_SECRET: "${STRIPE_SECRET}"
  JWT_PRIVATE_KEY: "${JWT_PRIVATE_KEY}"
  JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY}"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"

---

# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dfc
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---

# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: dfc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgis/postgis:15-3.3
        env:
        - name: POSTGRES_DB
          value: dfc
        - name: POSTGRES_USER
          value: dfc_admin
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dfc-secrets
              key: POSTGRES_PASSWORD
              optional: true
        ports:
        - containerPort: 5432
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "dfc_admin"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "dfc_admin"]
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        emptyDir: {}

---

# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dfc
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---

# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dfc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

---

# Ingest API Service
apiVersion: v1
kind: Service
metadata:
  name: ingest
  namespace: dfc
spec:
  type: ClusterIP
  selector:
    app: ingest
  ports:
    - port: 8000
      targetPort: 8000

---

# Ingest API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: dfc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      containers:
      - name: ingest
        image: ghcr.io/yourusername/dfc-ingest:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: dfc-config
        - secretRef:
            name: dfc-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 1Gi

---

# Ingest Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingest-hpa
  namespace: dfc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingest
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 60

---

# Predictor Service
apiVersion: v1
kind: Service
metadata:
  name: predictor
  namespace: dfc
spec:
  type: ClusterIP
  selector:
    app: predictor
  ports:
    - port: 8090
      targetPort: 8090

---

# Predictor Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictor
  namespace: dfc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: predictor
  template:
    metadata:
      labels:
        app: predictor
    spec:
      containers:
      - name: predictor
        image: ghcr.io/yourusername/dfc-predictor:latest
        ports:
        - containerPort: 8090
        envFrom:
        - configMapRef:
            name: dfc-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 1000m
            memory: 1Gi
          limits:
            cpu: 4000m
            memory: 4Gi

---

# Predictor Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: predictor-hpa
  namespace: dfc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: predictor
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85

---

# Entitlements Service
apiVersion: v1
kind: Service
metadata:
  name: entitlements
  namespace: dfc
spec:
  type: ClusterIP
  selector:
    app: entitlements
  ports:
    - port: 4010
      targetPort: 4010

---

# Entitlements Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: entitlements
  namespace: dfc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: entitlements
  template:
    metadata:
      labels:
        app: entitlements
    spec:
      containers:
      - name: entitlements
        image: ghcr.io/yourusername/dfc-entitlements:latest
        ports:
        - containerPort: 4010
        envFrom:
        - configMapRef:
            name: dfc-config
        - secretRef:
            name: dfc-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 4010
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4010
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi

---

# Entitlements Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: entitlements-hpa
  namespace: dfc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: entitlements
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80

---

# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dfc-ingress
  namespace: dfc
spec:
  rules:
  - host: api.datafightcentral.com
    http:
      paths:
      - path: /ingest
        pathType: Prefix
        backend:
          service:
            name: ingest
            port:
              number: 8000
      - path: /predict
        pathType: Prefix
        backend:
          service:
            name: predictor
            port:
              number: 8090
      - path: /entitlements
        pathType: Prefix
        backend:
          service:
            name: entitlements
            port:
              number: 4010

---

# Pod Disruption Budget (for safe drains)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ingest-pdb
  namespace: dfc
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ingest

---

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: entitlements-pdb
  namespace: dfc
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: entitlements
