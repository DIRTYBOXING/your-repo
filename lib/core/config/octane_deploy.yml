name: Deploy Octane Engine to Cloud Run

on:
  push:
    branches:
      - master
    paths:
      - 'main.py'
      - 'Dockerfile'
      - 'requirements.txt'

env:
  PROJECT_ID: datafightcentral
  SERVICE_NAME: dfc-octane-engine
  REGION: us-central1

jobs:
  deploy-octane:
    name: Build and Deploy Octane GPU Engine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Authorize Docker Push
        run: gcloud auth configure-docker

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME="gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}"
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      - name: Deploy to Cloud Run (with NVIDIA L4 GPU)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
            --region $REGION \
            --no-allow-unauthenticated \
            --memory 4Gi \
            --cpu 4 \
            --gpu 1 \
            --gpu-type nvidia-l4 \
            --timeout 3600