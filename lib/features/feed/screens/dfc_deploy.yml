name: DFC Master Pipeline Deploy

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js (For Firebase Functions)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Flutter Web (Penthouse UI)
        run: flutter build web --release

      - name: Install Cloud Functions Dependencies
        working-directory: ./functions
        run: npm install

      - name: Deploy to Firebase (Hosting, Functions, Rules)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --token $FIREBASE_TOKEN