## 3. Alerts Metric Mapping & Threshold formulas

| Alert Name | Prometheus Metric Query | Evaluation | Routing Severity |
|---|---|---|---|
| `DFCWebhookFailureElevated` | `sum(rate(payments_webhook_failures_total[5m])) / sum(rate(payments_webhook_requests_total[5m])) * 100 > 1.0` | 5m | critical |
| `DFCPaymentLatencyElevated` | `histogram_quantile(0.95, sum(rate(verify_session_duration_seconds_bucket[5m])) by (le)) > 5.0` | 5m | warning |
| `DFCReconciliationMismatchCritical` | `sum(dfc_reconciliation_mismatch_count) > 0` | 1m | critical |
| `DFCExposurePipelineDelay` | `histogram_quantile(0.5, sum(rate(exposure_ingest_latency_seconds_bucket[5m])) by (le)) > 30.0` | 5m | warning |
