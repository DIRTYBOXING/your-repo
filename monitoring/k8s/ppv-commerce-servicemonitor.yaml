apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ppv-commerce-servicemonitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: dfc-control-api
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
