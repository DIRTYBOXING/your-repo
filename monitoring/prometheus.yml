global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'dfc-monitoring'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ingest'
    static_configs:
      - targets: ['ingest:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'predictor'
    static_configs:
      - targets: ['predictor:8090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'entitlements'
    static_configs:
      - targets: ['entitlements:4010']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['db:5432']
    metrics_path: '/metrics'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'
