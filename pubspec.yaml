name: datafightcentral
description: Data Fight Central.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  cloud_firestore: ^6.1.2
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_analytics: ^12.1.2
  go_router: ^17.1.0
  equatable: ^2.0.5
  shared_preferences: ^2.4.20
  image_picker: ^1.2.1
  fl_chart: ^1.1.1
  intl: ^0.20.2
  video_player: ^2.10.1
  http: 1.2.2
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.6
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  desktop_drop: ^0.7.0
  file_picker: ^10.3.10
  cross_file: ^0.3.5+2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.2
  flutter_local_notifications: ^20.1.0
  cloud_functions: ^6.0.6
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.2
  vibration: ^1.8.4
  app_settings: ^4.2.1
  image: ^4.3.0
  camera: ^0.11.4
  geolocator: ^14.0.2
  youtube_player_iframe: ^5.2.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  google_maps_flutter: ^2.10.0
  google_maps_flutter_web: ^0.5.11
  google_mobile_ads: ^6.0.0
  flutter_dotenv: ^5.1.0
  web: ^1.1.0
  path: ^1.9.1
  uuid: ^4.5.1
  just_audio: ^0.10.5
  google_fonts: ^6.2.1
  firebase_crashlytics: ^5.0.8
  firebase_performance: ^0.11.1+5
  firebase_remote_config: ^6.2.0
  flutter_lints: ^6.0.0
  web_socket_channel: ^3.0.0
  chewie: ^1.7.1
  flutter_webrtc: ^0.12.8+1
  flutter_stripe: ^9.0.0
  flutter_svg: ^2.0.7
  visibility_detector: ^0.4.0+2
  flutter_facebook_auth: ^7.1.6
  wifi_scan: ^0.4.1
  flutter_blue_plus: ^1.35.3
  app_links: ^6.3.3
  wakelock_plus: ^1.2.8
  firebase_app_check: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  fake_cloud_firestore: ^4.1.0+1
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/Icon-1024.png
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: assets/icons/Icon-1024.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/icons/Icon-1024.png
    background_color: "#030810"
    theme_color: "#00E5FF"
  windows:
    generate: true
    image_path: assets/icons/Icon-1024.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icons/Icon-1024.png

flutter:
  uses-material-design: true
  assets:
    - assets/.env
    - assets/icons/pink_shield.png
    - assets/icons/dfc_logo.png
    - assets/videos/
    - assets/logos/
    - assets/icons/
    - assets/audio/
    - assets/campaigns/
    - assets/dfc_backgrounds/
    - assets/cluster_icons/
    - assets/ppv/
    - assets/poster_templates/
  shaders:
    - shaders/liquid_fire.frag
