<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Fight Central — Immersive XR Experience</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Enter the Data Fight Central metaverse. Immersive VR/AR combat sports experience — training, events, analytics and community in WebXR."
    />
    <meta property="og:title" content="DFC Metaverse — Enter the Arena" />
    <meta
      property="og:description"
      content="Immersive WebXR combat sports experience by Data Fight Central."
    />
    <meta
      property="og:image"
      content="https://www.datafightcentral.com/icons/Icon-512.png"
    />
    <meta property="og:url" content="https://www.datafightcentral.com/webxr/" />
    <meta property="og:type" content="website" />

    <!-- Meta Pixel -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = !0;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(
        window,
        document,
        "script",
        "https://connect.facebook.net/en_US/fbevents.js",
      );
      // Replace YOUR_PIXEL_ID with your actual Meta Pixel ID
      fbq("init", "YOUR_PIXEL_ID");
      fbq("track", "PageView");
      fbq("trackCustom", "WebXR_Landing");
    </script>
    <noscript
      ><img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"
    /></noscript>

    <!-- GA4 -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-XXXXXXXXXX");
    </script>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0f;
        color: #e0e0e0;
        font-family: "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
      }

      /* Loading overlay */
      #loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: radial-gradient(
          ellipse at center,
          #0d0d1a 0%,
          #000000 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.8s ease;
      }
      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #loading-overlay h1 {
        font-size: 2.5rem;
        font-weight: 900;
        letter-spacing: 0.1em;
        background: linear-gradient(90deg, #00f5ff, #ff00ff, #00ff88);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
      }
      #loading-overlay p {
        color: #aaa;
        font-size: 1rem;
        margin-bottom: 2rem;
      }
      .pulse-ring {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 3px solid #00f5ff;
        animation: pulse 1.5s ease-out infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(0.8);
          opacity: 1;
        }
        100% {
          transform: scale(1.6);
          opacity: 0;
        }
      }

      /* Enter button */
      #enter-btn {
        position: fixed;
        bottom: 10vh;
        left: 50%;
        transform: translateX(-50%);
        z-index: 900;
        padding: 1rem 3rem;
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        border: 2px solid #00f5ff;
        background: rgba(0, 245, 255, 0.1);
        color: #00f5ff;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s;
      }
      #enter-btn:hover {
        background: rgba(0, 245, 255, 0.25);
        box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
      }

      /* HUD overlay */
      #hud {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 800;
        font-size: 0.75rem;
        color: #00f5ff;
        opacity: 0.7;
        pointer-events: none;
      }

      /* CTA panel */
      #cta-panel {
        position: fixed;
        bottom: 12vh;
        right: 20px;
        z-index: 800;
        background: rgba(10, 10, 20, 0.85);
        border: 1px solid #ff00ff;
        border-radius: 12px;
        padding: 1.2rem;
        max-width: 280px;
        backdrop-filter: blur(10px);
        display: none;
      }
      #cta-panel h3 {
        color: #ff00ff;
        font-size: 1rem;
        margin-bottom: 0.5rem;
      }
      #cta-panel p {
        font-size: 0.85rem;
        color: #ccc;
        margin-bottom: 0.8rem;
      }
      #cta-panel a {
        display: inline-block;
        padding: 0.5rem 1.5rem;
        background: linear-gradient(135deg, #00f5ff, #ff00ff);
        color: #000;
        font-weight: 700;
        text-decoration: none;
        border-radius: 6px;
      }
      #cta-panel a:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-overlay">
      <h1>DATA FIGHT CENTRAL</h1>
      <p>Initialising immersive arena...</p>
      <div class="pulse-ring"></div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div>DFC METAVERSE v1.0</div>
      <div id="hud-status">LOADING...</div>
    </div>

    <!-- Enter XR button -->
    <button id="enter-btn" style="display: none">ENTER THE ARENA</button>

    <!-- CTA Panel -->
    <div id="cta-panel">
      <h3>Join the Fight</h3>
      <p>
        Access real-time analytics, fighter stats, and live events on the full
        DFC platform.
      </p>
      <a href="https://www.datafightcentral.com/" id="cta-link">Launch DFC</a>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════
       A-FRAME SCENE — DFC Arena
       ═══════════════════════════════════════════════════════════════ -->
    <a-scene
      id="xr-scene"
      vr-mode-ui="enabled: true"
      loading-screen="enabled: false"
      renderer="antialias: true; colorManagement: true; sortObjects: true"
      fog="type: exponential; color: #0a0a0f; density: 0.04"
    >
      <!-- Assets -->
      <a-assets timeout="15000">
        <img
          id="sky-texture"
          src="https://cdn.aframe.io/a-painter/images/sky.jpg"
          crossorigin="anonymous"
        />
      </a-assets>

      <!-- Sky -->
      <a-sky
        color="#0a0a0f"
        animation="property: material.color; to: #0d0d2a; dur: 4000; easing: easeInOutQuad"
      ></a-sky>

      <!-- Ambient lighting -->
      <a-light type="ambient" color="#222244" intensity="0.4"></a-light>
      <a-light
        type="directional"
        color="#00F5FF"
        intensity="0.6"
        position="2 4 -3"
      ></a-light>
      <a-light
        type="point"
        color="#FF00FF"
        intensity="0.5"
        position="-3 3 2"
        animation="property: position; to: 3 3 -2; dur: 8000; dir: alternate; loop: true"
      ></a-light>

      <!-- Arena Floor — Octagon -->
      <a-cylinder
        position="0 0 -5"
        radius="8"
        height="0.15"
        color="#111122"
        metalness="0.8"
        roughness="0.3"
        segments-radial="8"
      ></a-cylinder>
      <!-- Floor glow ring -->
      <a-torus
        position="0 0.1 -5"
        radius="8"
        radius-tubular="0.05"
        color="#00F5FF"
        material="emissive: #00F5FF; emissiveIntensity: 0.6; opacity: 0.7; transparent: true"
        segments-radial="8"
        segments-tubular="24"
        animation="property: material.emissiveIntensity; from: 0.3; to: 0.8; dur: 2000; dir: alternate; loop: true"
      ></a-torus>

      <!-- Center Logo Ring -->
      <a-torus
        position="0 2.5 -5"
        radius="1.2"
        radius-tubular="0.03"
        color="#FF00FF"
        material="emissive: #FF00FF; emissiveIntensity: 0.8; opacity: 0.8; transparent: true"
        rotation="90 0 0"
        animation="property: rotation; to: 90 360 0; dur: 20000; loop: true; easing: linear"
      ></a-torus>

      <!-- DFC Title Text -->
      <a-text
        value="DATA FIGHT CENTRAL"
        position="0 3.8 -5"
        align="center"
        color="#00F5FF"
        width="8"
        font="mozillavr"
        animation="property: material.opacity; from: 0.6; to: 1; dur: 2000; dir: alternate; loop: true"
      ></a-text>
      <a-text
        value="WE ARE NOT JUST FIGHTING — WE ARE THE FIGHT"
        position="0 3.2 -5"
        align="center"
        color="#FF00FF"
        width="5"
        font="mozillavr"
      ></a-text>

      <!-- Pillar posts around octagon -->
      <a-cylinder
        position="5.6 1.5 -1.7"
        radius="0.12"
        height="3"
        color="#00FF88"
        material="emissive: #00FF88; emissiveIntensity: 0.4"
      ></a-cylinder>
      <a-cylinder
        position="-5.6 1.5 -1.7"
        radius="0.12"
        height="3"
        color="#00FF88"
        material="emissive: #00FF88; emissiveIntensity: 0.4"
      ></a-cylinder>
      <a-cylinder
        position="5.6 1.5 -8.3"
        radius="0.12"
        height="3"
        color="#00F5FF"
        material="emissive: #00F5FF; emissiveIntensity: 0.4"
      ></a-cylinder>
      <a-cylinder
        position="-5.6 1.5 -8.3"
        radius="0.12"
        height="3"
        color="#00F5FF"
        material="emissive: #00F5FF; emissiveIntensity: 0.4"
      ></a-cylinder>
      <a-cylinder
        position="0 1.5 1.7"
        radius="0.12"
        height="3"
        color="#FF00FF"
        material="emissive: #FF00FF; emissiveIntensity: 0.4"
      ></a-cylinder>
      <a-cylinder
        position="8 1.5 -5"
        radius="0.12"
        height="3"
        color="#FF00FF"
        material="emissive: #FF00FF; emissiveIntensity: 0.4"
      ></a-cylinder>
      <a-cylinder
        position="-8 1.5 -5"
        radius="0.12"
        height="3"
        color="#FF00FF"
        material="emissive: #FF00FF; emissiveIntensity: 0.4"
      ></a-cylinder>
      <a-cylinder
        position="0 1.5 -11.7"
        radius="0.12"
        height="3"
        color="#00FF88"
        material="emissive: #00FF88; emissiveIntensity: 0.4"
      ></a-cylinder>

      <!-- Rope lines (connecting pillars) -->
      <a-entity
        line="start: 5.6 2.5 -1.7; end: 0 2.5 1.7; color: #00F5FF; opacity: 0.4"
      ></a-entity>
      <a-entity
        line="start: -5.6 2.5 -1.7; end: 0 2.5 1.7; color: #00F5FF; opacity: 0.4"
      ></a-entity>

      <!-- Floating info panels -->
      <a-plane
        position="-4 2 -3"
        rotation="0 30 0"
        width="2.5"
        height="1.5"
        material="color: #0a0a1a; opacity: 0.85; transparent: true"
      >
        <a-text
          value="LIVE ANALYTICS"
          position="0 0.45 0.01"
          align="center"
          color="#00F5FF"
          width="2"
        ></a-text>
        <a-text
          value="Real-time fight stats\nAI predictions\n12-Pillar Safety"
          position="0 -0.05 0.01"
          align="center"
          color="#aaa"
          width="1.8"
        ></a-text>
      </a-plane>

      <a-plane
        position="4 2 -3"
        rotation="0 -30 0"
        width="2.5"
        height="1.5"
        material="color: #0a0a1a; opacity: 0.85; transparent: true"
      >
        <a-text
          value="FIGHTWIRE"
          position="0 0.45 0.01"
          align="center"
          color="#FF00FF"
          width="2"
        ></a-text>
        <a-text
          value="50+ RSS sources\nMeta + YouTube\nAuto-curated feed"
          position="0 -0.05 0.01"
          align="center"
          color="#aaa"
          width="1.8"
        ></a-text>
      </a-plane>

      <a-plane
        position="0 2 -9"
        rotation="0 0 0"
        width="2.5"
        height="1.5"
        material="color: #0a0a1a; opacity: 0.85; transparent: true"
      >
        <a-text
          value="GLOBAL REACH"
          position="0 0.45 0.01"
          align="center"
          color="#00FF88"
          width="2"
        ></a-text>
        <a-text
          value="190+ countries\nAsia · Africa · Oceania\nMultilingual support"
          position="0 -0.05 0.01"
          align="center"
          color="#aaa"
          width="1.8"
        ></a-text>
      </a-plane>

      <!-- Floating particles -->
      <a-entity id="particles" position="0 2 -5">
        <a-sphere
          position="2 1 0"
          radius="0.04"
          color="#00F5FF"
          material="emissive: #00F5FF"
          animation="property: position; to: -2 3 -1; dur: 6000; dir: alternate; loop: true"
        ></a-sphere>
        <a-sphere
          position="-1 2 1"
          radius="0.03"
          color="#FF00FF"
          material="emissive: #FF00FF"
          animation="property: position; to: 1 0.5 -2; dur: 5000; dir: alternate; loop: true"
        ></a-sphere>
        <a-sphere
          position="0 3 -1"
          radius="0.05"
          color="#00FF88"
          material="emissive: #00FF88"
          animation="property: position; to: 0 1 1; dur: 7000; dir: alternate; loop: true"
        ></a-sphere>
        <a-sphere
          position="-3 1 0"
          radius="0.03"
          color="#00F5FF"
          material="emissive: #00F5FF"
          animation="property: position; to: 3 2 0; dur: 4500; dir: alternate; loop: true"
        ></a-sphere>
        <a-sphere
          position="1 0.5 2"
          radius="0.04"
          color="#FF00FF"
          material="emissive: #FF00FF"
          animation="property: position; to: -1 3 -2; dur: 5500; dir: alternate; loop: true"
        ></a-sphere>
      </a-entity>

      <!-- Camera rig -->
      <a-entity id="rig" position="0 1.6 2">
        <a-camera
          look-controls="pointerLockEnabled: false"
          wasd-controls="acceleration: 30"
        ></a-camera>
      </a-entity>
    </a-scene>

    <script>
      // Track XR engagement for analytics
      const scene = document.getElementById("xr-scene");
      const loadingOverlay = document.getElementById("loading-overlay");
      const enterBtn = document.getElementById("enter-btn");
      const ctaPanel = document.getElementById("cta-panel");
      const hudStatus = document.getElementById("hud-status");
      let sessionStart = null;

      scene.addEventListener("loaded", () => {
        hudStatus.textContent = "ARENA READY";
        setTimeout(() => {
          loadingOverlay.classList.add("hidden");
          enterBtn.style.display = "block";
        }, 1500);
      });

      enterBtn.addEventListener("click", () => {
        enterBtn.style.display = "none";
        ctaPanel.style.display = "block";
        hudStatus.textContent = "EXPLORING";
        sessionStart = Date.now();

        // Meta Pixel: custom event
        if (typeof fbq === "function") {
          fbq("trackCustom", "WebXR_Enter_Arena");
        }
        // GA4: custom event
        if (typeof gtag === "function") {
          gtag("event", "webxr_enter_arena", {
            event_category: "metaverse",
            event_label: "dfc_arena",
          });
        }
      });

      // Track dwell time on page unload
      window.addEventListener("beforeunload", () => {
        if (sessionStart) {
          const dwellSeconds = Math.round((Date.now() - sessionStart) / 1000);
          if (typeof fbq === "function") {
            fbq("trackCustom", "WebXR_Dwell", { seconds: dwellSeconds });
          }
          if (typeof gtag === "function") {
            gtag("event", "webxr_dwell", {
              value: dwellSeconds,
              event_category: "metaverse",
            });
          }
        }
      });

      // Track CTA click
      document.getElementById("cta-link").addEventListener("click", () => {
        if (typeof fbq === "function") {
          fbq("trackCustom", "WebXR_CTA_Click", {
            destination: "main_platform",
          });
        }
        if (typeof gtag === "function") {
          gtag("event", "webxr_cta_click", {
            event_category: "conversion",
            event_label: "main_platform",
          });
        }
      });
    </script>
  </body>
</html>
